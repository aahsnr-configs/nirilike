# .mise.local.toml.example
#
# Copy this file to .mise.local.toml and fill in the values for your machine.
# .mise.local.toml is gitignored and never committed.
#
# Usage:
#   cp .mise.local.toml.example .mise.local.toml
#   $EDITOR .mise.local.toml

[env]
# Absolute path to your custom Hyprland fork source tree.
# Required by: mise run headers
HYPRLAND_SRC = "/home/your-username/src/Hyprland"
